<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Ramirez | Performance Tracker</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #051C2C;
            --sky: #7BAFD4;
            --khaki: #D9B48F;
            --dark-bg: #020d14;
            --card-bg: rgba(10, 37, 54, 0.95);
            --text: #f0f4f7;
            --accent-green: #4ade80;
            --border: rgba(123, 175, 212, 0.2);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #051C2C, #020d14);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid var(--khaki);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        h1 { margin: 0; font-size: 2.2rem; letter-spacing: -1px; text-transform: uppercase; }
        .number { color: var(--khaki); margin-left: 10px; }
        .team-subtitle { color: var(--sky); font-weight: bold; margin-bottom: 20px; display: block; }

        /* Metric Grid */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--sky);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .metric-card.gold { border-left-color: var(--khaki); }
        .metric-card label { font-size: 0.75rem; color: var(--sky); text-transform: uppercase; font-weight: 900; }
        .metric-card .value { font-size: 2.5rem; font-weight: 900; margin: 5px 0; }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        h3 { color: var(--khaki); text-transform: uppercase; font-size: 0.9rem; margin-top: 0; }

        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; font-size: 0.7rem; color: var(--sky); padding: 10px; border-bottom: 1px solid var(--navy); }
        td { padding: 12px 10px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .highlight-row { background: rgba(217, 180, 143, 0.1); color: var(--khaki); font-weight: bold; }

        /* Popularity Section */
        .popularity-content { text-align: center; }
        .spike-value { font-size: 3.5rem; font-weight: 900; color: var(--accent-green); margin: 10px 0; }
        .chart-container { height: 200px; margin-top: 20px; }

        @media (max-width: 800px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
