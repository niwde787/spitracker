<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Ramirez | Performance Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <header>
            <div class="profile">
                <h1>Lucas Ramirez <span class="number">#3</span></h1>
                <p class="team">Tri-City Dust Devils | High-A</p>
            </div>
            <div class="status-badge">2026 Season Active</div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <label>AVG</label>
                <h2 id="avg">.000</h2>
            </div>
            <div class="card">
                <label>Home Runs</label>
                <h2 id="hr">0</h2>
            </div>
            <div class="card">
                <label>RBIs</label>
                <h2 id="rbi">0</h2>
            </div>
            <div class="card">
                <label>OPS</label>
                <h2 id="ops">.000</h2>
            </div>
            <div class="card highlight">
                <label>EST. WAR</label>
                <h2 id="war">0.0</h2>
            </div>
        </div>

        <section class="news-section">
            <h3>Latest Headlines</h3>
            <ul id="news-list">
                <li>Loading latest scout reports...</li>
            </ul>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
